{% extends 'layout.html' %}

{% block title %}Posts list{% endblock %}

{% block content %}
    <h1>Posts Page</h1>
    <p>Post count: {{ posts|length }}</p>

    {% for post in posts %}
        <h2>{{ post.title }}</h2>
        <p>{{ post.body }}</p>
    {% empty %}
        <p>No posts available.</p>
    {% endfor %}
{% endblock %}
